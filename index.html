<h1 class="site-title">🐾 THE PET CORNER 🐾</h1>
<style> .site-title{
    font-size: 40px;
    font-family: 'Poppins', sans-serif;
    font-weight: bold;
    text-align: center;
    background: linear-gradient(
        90deg,
        #00ff88,
        #00c3ff,
        #ffcc00,
        #ff66cc
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        filter: drop-shadow(0 0 5px #00ff88);
    }
    to {
        filter: drop-shadow(0 0 15px #00c3ff);
    }
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f5f5f5;
}

<header> 
</header>
     alt="The Pet Corner Logo"
     class="logo">

header img{
width:60px;
border-radius:20px;
margin-bottom:15px;
}

header h1{
font-size:40px;
}

header p{
font-size:18px;
margin-top:10px;
}

.banner{
padding:20px;
}

.banner img{
width:100%;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.services{
padding:30px 20px;
text-align:center;
}

.services h2{
font-size:32px;
margin-bottom:25px;
color:#009688;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
transition:0.3s;
}
